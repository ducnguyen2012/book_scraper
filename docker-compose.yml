version: "3.9"


services:

  api:

    build: .

    container_name: book-api

    ports:
      - "8000:8000"


    volumes:
      - ./data:/app/data
      - ./logs:/app/logs


    depends_on:
      - redis



  redis:

    image: redis:latest

    container_name: book-redis


    ports:
      - "6379:6379"


    volumes:
      - redis_data:/data



volumes:

  redis_data: